<div>
    <label class="block text-xs font-semibold uppercase text-gray-400 mb-1">Date</label>
    <input type="text" id="mvDateVisual" placeholder="DD/MM/YYYY" maxlength="10"
        oninput="MoneycoDateMask.applyMovementMask(this)"
        onblur="if(this.value.length < 10) { this.value = ''; document.getElementById('mvDate').value = ''; }"
        class="w-full bg-gray-900 border border-gray-800 rounded-xl px-3 py-2 text-sm text-gray-100 focus:outline-none focus:border-blue-500 font-mono">
    <input type="hidden" id="mvDate">
</div>
